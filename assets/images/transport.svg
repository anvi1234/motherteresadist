  <!-- Windows -->
  <rect x="14" y="24" width="8" height="6" stroke="#ffb606" stroke-width="2"></rect>
  <rect x="24" y="24" width="8" height="6" stroke="#ffb606" stroke-width="2"></rect>
  <rect x="34" y="24" width="8" height="6" stroke="#ffb606" stroke-width="2"></rect>

  <!-- Door -->
